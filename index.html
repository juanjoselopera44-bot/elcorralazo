<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL CORRALAZO ULTRA PRO</title>

<style>
body{margin:0;font-family:'Segoe UI',Arial;background:url('https://ccviva.com/sites/default/files/2024-06/Hamburguesas_El_Corral_Tunja.jpg') no-repeat center center fixed;background-size:cover;color:white}
.overlay{background:rgba(0,0,0,0.88);min-height:100vh;padding:20px}
header{text-align:center;background:#c0392b;padding:20px;border-radius:15px;font-size:28px;font-weight:bold}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#e74c3c;color:white;cursor:pointer}
button:hover{background:#ff5c4d}
input,select{padding:8px;margin:5px;border-radius:5px;border:none}
.card{background:#1c1c1c;padding:15px;margin:10px;border-radius:12px;display:inline-block;width:230px;text-align:center;transition:.2s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:140px;object-fit:cover;border-radius:10px}
.grid{display:flex;flex-wrap:wrap;justify-content:center}
.hidden{display:none}
.topbar{display:flex;justify-content:space-between}
.badge{background:#f39c12;padding:5px 10px;border-radius:8px}
</style>
</head>

<body>
<div class="overlay">
<header>🍔 EL CORRALAZO</header>

<div id="mainMenu" class="center">
<h2>Selecciona rol</h2>
<button onclick="enterClient()">Cliente</button>
<button onclick="showWorker()">Trabajador</button>
<button onclick="showOwner()">Dueño</button>
</div>

<div id="workerLogin" class="hidden center">
<input type="password" id="workerPass" placeholder="Contraseña">
<button onclick="loginWorker()">Entrar</button>
</div>

<div id="ownerLogin" class="hidden center">
<input type="password" id="ownerPass" placeholder="Contraseña">
<button onclick="loginOwner()">Entrar</button>
</div>

<!-- DUEÑO -->
<div id="owner" class="hidden">
<div class="topbar"><h2>👑 Dueño</h2><button onclick="home()">Salir</button></div>

<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="desc" placeholder="Descripción">
<input id="img" placeholder="Link imagen">
<input type="file" id="fileImg">
<button onclick="addProduct()">Agregar</button>

<h3>Promos</h3>
<input id="promo">
<button onclick="addPromo()">Agregar</button>
<div id="promos" class="grid"></div>

<h3>Reseñas</h3>
<button onclick="toggleReviews()">Ver</button>
<div id="reviewsBox" class="hidden"></div>

<h3>Logs</h3>
<div id="logs"></div>
</div>

<!-- TRABAJADOR -->
<div id="seller" class="hidden">
<div class="topbar"><h2>💰 Trabajador</h2><button onclick="home()">Salir</button></div>
<div id="ordersBox"></div>
</div>

<!-- CLIENTE -->
<div id="client" class="hidden">
<div class="topbar"><h2>🍔 Menú</h2><span id="count" class="badge">0</span></div>
<div id="menu" class="grid"></div>

<h3>Reseña</h3>
<input id="reviewText" placeholder="Tu opinión">
<select id="stars">
<option value="1">⭐</option>
<option value="2">⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
</select>
<button onclick="addReview()">Enviar</button>

<button onclick="home()">Salir</button>
</div>

<script>
// DATOS PERSISTENTES
let products=JSON.parse(localStorage.getItem("products"))||[];
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let reviews=JSON.parse(localStorage.getItem("reviews"))||[];
let promos=JSON.parse(localStorage.getItem("promos"))||[];
let logs=JSON.parse(localStorage.getItem("logs"))||[];
let role="";

function saveData(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("orders",JSON.stringify(orders));
localStorage.setItem("reviews",JSON.stringify(reviews));
localStorage.setItem("promos",JSON.stringify(promos));
localStorage.setItem("logs",JSON.stringify(logs));
}

function log(t){logs.push(role+" → "+t+" - "+new Date().toLocaleTimeString());renderLogs()}

function hideAll(){["mainMenu","workerLogin","ownerLogin","owner","seller","client"].forEach(id=>document.getElementById(id).classList.add("hidden"))}
function home(){hideAll();document.getElementById("mainMenu").classList.remove("hidden")}

function enterClient(){role="Cliente";hideAll();document.getElementById("client").classList.remove("hidden");renderMenu();log("Ingreso")}
function showWorker(){hideAll();document.getElementById("workerLogin").classList.remove("hidden")}
function showOwner(){hideAll();document.getElementById("ownerLogin").classList.remove("hidden")}

function loginWorker(){
if(document.getElementById("workerPass").value==="combox3213"){
role="Trabajador";
hideAll();
document.getElementById("seller").classList.remove("hidden");
renderOrders();
log("Ingreso");
}else alert("Error")
}

function loginOwner(){
if(document.getElementById("ownerPass").value==="salchipapita131k"){
role="Dueño";
hideAll();
document.getElementById("owner").classList.remove("hidden");
renderMenu();
log("Ingreso");
}else alert("Error")
}

function addProduct(){
let n=name.value,p=price.value,d=desc.value,link=img.value,file=fileImg.files[0];
if(n===""||p==="") return alert("Completa datos");

if(file){
let r=new FileReader();
r.onload=e=>{
products.push({n,p,d,img:e.target.result});
saveData();
renderMenu();
};
r.readAsDataURL(file);
}else{
products.push({n,p,d,img:link});
saveData();
renderMenu();
}

log("Producto creado: "+n)
}

function deleteProduct(i){
if(!confirm("¿Seguro que quieres eliminar este producto?")) return;
products.splice(i,1);
saveData();
renderMenu();
log("Producto eliminado");
}

function renderMenu(){
let html=products.map((x,i)=>`
<div class='card'>
${x.img?`<img src="${x.img}">`:""}
<h3>${x.n}</h3>
<p>${x.d}</p>
<p>$${x.p}</p>
<button onclick="order(${i})">Pedir</button>
${role==="Dueño"?`<button onclick="deleteProduct(${i})">❌</button>`:""}
</div>`).join("");

document.getElementById("menu").innerHTML=html;
}

function order(i){
orders.push(products[i]);
document.getElementById("count").innerText=orders.length;
saveData();
renderOrders();
log("Pedido: "+products[i].n);
}

function renderOrders(){
let box=document.getElementById("ordersBox");
if(!box) return;

if(orders.length===0){box.innerHTML="<p>No hay pedidos</p>";return}

box.innerHTML=orders.map((o,i)=>`
<div class='card'>
<h3>${o.n}</h3>
<p>$${o.p}</p>
<button onclick="pay(${i})">Cobrar</button>
</div>`).join("");
}

function pay(i){
orders.splice(i,1);
saveData();
renderOrders();
document.getElementById("count").innerText=orders.length;
log("Pago realizado");
}

function addPromo(){
if(promo.value==="") return;
promos.push(promo.value);
saveData();
renderPromos();
promo.value="";
log("Promo creada");
}
function renderPromos(){document.getElementById("promos").innerHTML=promos.map((p,i)=>`<div class='card'>🔥 ${p}<br><button onclick="removePromo(${i})">Eliminar</button></div>`).join("")}
function removePromo(i){
promos.splice(i,1);
saveData();
renderPromos();
}

function addReview(){
let text=document.getElementById("reviewText").value;
let star=document.getElementById("stars").value;
if(text.trim()==="") return alert("Escribe reseña");

reviews.push({text,star});
document.getElementById("reviewText").value="";
saveData();
renderReviews();
log("Reseña agregada");
}

function toggleReviews(){
let box=document.getElementById("reviewsBox");
box.classList.toggle("hidden");
renderReviews();
}

function renderReviews(){
let box=document.getElementById("reviewsBox");
box.innerHTML=reviews.map(r=>`<div class='card'>${"⭐".repeat(r.star)}<br>${r.text}</div>`).join("");
}

function renderLogs(){document.getElementById("logs").innerHTML=logs.map(l=>`<div class='card'>${l}</div>`).join("")}
</script>

</div>
</body>
</html>
