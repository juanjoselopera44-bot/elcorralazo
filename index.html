<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL CORRALAZO</title>

<style>
body{margin:0;font-family:Arial;background:url('https://ccviva.com/sites/default/files/2024-06/Hamburguesas_El_Corral_Tunja.jpg') no-repeat center center fixed;background-size:cover;color:white}
.overlay{background:rgba(0,0,0,0.7);min-height:100vh;padding:20px}
header{text-align:center;background:#c0392b;padding:15px;border-radius:10px}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#e74c3c;color:white;cursor:pointer}
input{padding:8px;margin:5px;border-radius:5px;border:none}
.card{background:#1c1c1c;padding:15px;margin:10px;border-radius:10px;display:inline-block;width:200px;vertical-align:top;text-align:center}
.card img{width:100%;border-radius:10px}
.hidden{display:none}
.center{text-align:center}
.grid{display:flex;flex-wrap:wrap;justify-content:center}
</style>
</head>

<body>
<div class="overlay">

<header>
<h1>🍔 EL CORRALAZO</h1>
</header>

<div id="mainMenu" class="center">
<h2>Selecciona cómo ingresar</h2>
<button onclick="enterClient()">Cliente</button>
<button onclick="showWorkerLogin()">Trabajador</button>
<button onclick="showOwnerLogin()">Dueño</button>
</div>

<div id="workerLogin" class="hidden center">
<input type="password" id="workerPass" placeholder="Contraseña">
<button onclick="loginWorker()">Entrar</button>
</div>

<div id="ownerLogin" class="hidden center">
<input type="password" id="ownerPass" placeholder="Contraseña">
<button onclick="loginOwner()">Entrar</button>
</div>

<div id="owner" class="hidden">
<h2>👑 Dueño</h2>
<input id="name" placeholder="Producto">
<input id="price" placeholder="Precio">
<input id="img" placeholder="Link imagen (opcional)">
<input type="file" id="fileImg">
<button onclick="addProduct()">Agregar</button>

<h3>Promociones</h3>
<input id="promo">
<button onclick="addPromo()">Agregar Promo</button>
<div id="promos"></div>

<h3>Reseñas</h3>
<button onclick="toggleReviews()">Ver Reseñas</button>
<div id="reviews" class="hidden"></div>

<h3>Logs</h3>
<div id="logs"></div>
</div>

<div id="seller" class="hidden">
<h2>💰 Trabajador</h2>
<div id="orders"></div>
</div>

<div id="client" class="hidden">
<h2>🍔 Menú</h2>
<div id="menu" class="grid"></div>

<h3>Reseñas</h3>
<input id="reviewText">
<button onclick="addReview()">Enviar</button>
</div>

<script>
let products=[];
let reviews=[];
let orders=[];
let logs=[];
let promos=[];
let currentRole="";

function log(t){
logs.push(currentRole+" → "+t+" - "+new Date().toLocaleString());
renderLogs();
}

function hideAll(){
document.getElementById("mainMenu").classList.add("hidden");
document.getElementById("workerLogin").classList.add("hidden");
document.getElementById("ownerLogin").classList.add("hidden");
}

function enterClient(){currentRole="Cliente";hideAll();document.getElementById("client").classList.remove("hidden");renderMenu();log("Ingreso")}
function showWorkerLogin(){hideAll();document.getElementById("workerLogin").classList.remove("hidden")}
function showOwnerLogin(){hideAll();document.getElementById("ownerLogin").classList.remove("hidden")}

function loginWorker(){
if(document.getElementById("workerPass").value==="combox3213"){
currentRole="Trabajador";document.getElementById("workerLogin").classList.add("hidden");document.getElementById("seller").classList.remove("hidden");renderOrders();log("Ingreso")
}else alert("Contraseña incorrecta")}

function loginOwner(){
if(document.getElementById("ownerPass").value==="salchipapita131k"){
currentRole="Dueño";document.getElementById("ownerLogin").classList.add("hidden");document.getElementById("owner").classList.remove("hidden");log("Ingreso")
}else alert("Contraseña incorrecta")}

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let img=document.getElementById("img").value;
let file=document.getElementById("fileImg").files[0];

if(file){
let reader=new FileReader();
reader.onload=function(e){
products.push({name,price,img:e.target.result});
renderMenu();
};
reader.readAsDataURL(file);
}else{
products.push({name,price,img});
renderMenu();
}
log("Producto creado: "+name);
}

function addPromo(){
let p=document.getElementById("promo").value;
promos.push(p);
renderPromos();
log("Promo agregada")
}

function deletePromo(i){
promos.splice(i,1);
renderPromos();
log("Promo eliminada")
}

function renderPromos(){
let h="";
promos.forEach((x,i)=>h+=`<div class='card'>🔥 ${x}<br><button onclick='deletePromo(${i})'>Eliminar</button></div>`);
document.getElementById("promos").innerHTML=h;
}

function renderMenu(){
let h="";
products.forEach((x,i)=>h+=`<div class='card'>${x.img?`<img src='${x.img}'>`:""}<h3>${x.name}</h3><p>$${x.price}</p><button onclick='order(${i})'>Pedir</button></div>`);
document.getElementById("menu").innerHTML=h;
}

function order(i){orders.push(products[i]);log("Pedido: "+products[i].name)}

function renderOrders(){
let h="";
orders.forEach(o=>h+=`<div class='card'>${o.name} - $${o.price} <button onclick='pay()'>Cobrar</button></div>`);
document.getElementById("orders").innerHTML=h;
}

function pay(){alert("Pago realizado");log("Pago realizado")}

function addReview(){
let r=document.getElementById("reviewText").value;
reviews.push(r);
renderReviews();
log("Reseña agregada")
}

function toggleReviews(){
let div=document.getElementById("reviews");
if(div.classList.contains("hidden")){div.classList.remove("hidden");renderReviews()}else{div.classList.add("hidden")}
}

function renderReviews(){
let h="";
reviews.forEach(r=>h+=`<div class='card'>${r}</div>`);
document.getElementById("reviews").innerHTML=h;
}

function renderLogs(){
let h="";
logs.forEach(l=>h+=`<div class='card'>${l}</div>`);
document.getElementById("logs").innerHTML=h;
}
</script>

</div>
</body>
</html>
