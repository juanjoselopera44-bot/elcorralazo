<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL CORRALAZO</title>

<style>
body{
margin:0;
font-family:Arial;
background:url('https://ccviva.com/sites/default/files/2024-06/Hamburguesas_El_Corral_Tunja.jpg') no-repeat center center fixed;
background-size:cover;
color:white;
}

.overlay{background:rgba(0,0,0,0.8);min-height:100vh;padding:20px}
header{text-align:center;background:#c0392b;padding:20px;border-radius:15px;font-size:26px}

button{padding:10px;margin:5px;border:none;border-radius:8px;background:#e74c3c;color:white;cursor:pointer}
button:hover{background:#ff5c4d}

input, select{padding:8px;margin:5px;border-radius:5px;border:none}

.card{
background:#1c1c1c;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
width:230px;
text-align:center;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
border-radius:10px;
}

.grid{display:flex;flex-wrap:wrap;justify-content:center}
.hidden{display:none}
.topbar{display:flex;justify-content:space-between}
</style>
</head>

<body>
<div class="overlay">

<header>🍔 EL CORRALAZO</header>

<!-- MENU -->
<div id="mainMenu" class="center">
<h2>Selecciona rol</h2>
<button onclick="enterClient()">Cliente</button>
<button onclick="showWorker()">Trabajador</button>
<button onclick="showOwner()">Dueño</button>
</div>

<!-- LOGIN -->
<div id="workerLogin" class="hidden center">
<input type="password" id="workerPass">
<button onclick="loginWorker()">Entrar</button>
</div>

<div id="ownerLogin" class="hidden center">
<input type="password" id="ownerPass">
<button onclick="loginOwner()">Entrar</button>
</div>

<!-- DUEÑO -->
<div id="owner" class="hidden">
<div class="topbar"><h2>👑 Dueño</h2><button onclick="home()">Salir</button></div>

<input id="name" placeholder="Nombre">
<input id="price" placeholder="Precio">
<input id="desc" placeholder="Descripción">
<input id="img" placeholder="Link imagen">
<input type="file" id="fileImg">
<button onclick="addProduct()">Agregar</button>

<h3>Promos</h3>
<input id="promo">
<button onclick="addPromo()">Agregar</button>
<div id="promos"></div>

<h3>Reseñas</h3>
<button onclick="toggleReviews()">Ver</button>
<div id="reviewsBox" class="hidden"></div>

<h3>Logs</h3>
<div id="logs"></div>
</div>

<!-- TRABAJADOR -->
<div id="seller" class="hidden">
<div class="topbar"><h2>💰 Trabajador</h2><button onclick="home()">Salir</button></div>
<div id="ordersBox"></div>
</div>

<!-- CLIENTE -->
<div id="client" class="hidden">
<div class="topbar"><h2>🍔 Menú</h2><span id="count">0</span></div>
<div id="menu" class="grid"></div>

<h3>Reseña</h3>
<input id="reviewText">
<select id="stars">
<option value="1">⭐</option>
<option value="2">⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="5">⭐⭐⭐⭐⭐</option>
</select>
<button onclick="addReview()">Enviar</button>

<button onclick="home()">Salir</button>
</div>

<script>
let products=[], orders=[], reviews=[], promos=[], logs=[];
let role="";

function log(t){
logs.push(role+" → "+t+" - "+new Date().toLocaleTimeString());
renderLogs();
}

function hideAll(){
["mainMenu","workerLogin","ownerLogin","owner","seller","client"].forEach(id=>document.getElementById(id).classList.add("hidden"))
}

function home(){hideAll();mainMenu.classList.remove("hidden")}

function enterClient(){role="Cliente";hideAll();client.classList.remove("hidden");renderMenu();log("Ingreso")}
function showWorker(){hideAll();workerLogin.classList.remove("hidden")}
function showOwner(){hideAll();ownerLogin.classList.remove("hidden")}

function loginWorker(){
if(workerPass.value==="combox3213"){
role="Trabajador";
hideAll();
seller.classList.remove("hidden");
renderOrders();
log("Ingreso");
}else alert("Error");
}

function loginOwner(){
if(ownerPass.value==="salchipapita131k"){
role="Dueño";
hideAll();
owner.classList.remove("hidden");
log("Ingreso");
}else alert("Error");
}

function addProduct(){
let n=name.value, p=price.value, d=desc.value, link=img.value, file=fileImg.files[0];

if(file){
let r=new FileReader();
r.onload=e=>{
products.push({n,p,d,img:e.target.result});
renderMenu();
};
r.readAsDataURL(file);
}else{
products.push({n,p,d,img:link});
renderMenu();
}

log("Producto creado: "+n);
}

function renderMenu(){
let html=products.map((x,i)=>`
<div class='card'>
${x.img?`<img src="${x.img}">`:""}
<h3>${x.n}</h3>
<p>${x.d}</p>
<p>$${x.p}</p>
<button onclick="order(${i})">Pedir</button>
</div>`).join("");

menu.innerHTML=html;
}

function order(i){
orders.push(products[i]);
document.getElementById("count").innerText=orders.length;
renderOrders();
log("Pedido: "+products[i].n);
}

function renderOrders(){
let html=orders.map(o=>`
<div class='card'>
${o.n} - $${o.p}
<br><button onclick="pay()">Cobrar</button>
</div>`).join("");

document.getElementById("ordersBox").innerHTML=html;
}

function pay(){
alert("Pago hecho");
orders=[];
renderOrders();
document.getElementById("count").innerText=0;
log("Pago realizado");
}

function addPromo(){
promos.push(promo.value);
renderPromos();
log("Promo creada");
}

function renderPromos(){
let html=promos.map((p,i)=>`
<div class='card'>
🔥 ${p}
<br><button onclick="removePromo(${i})">Eliminar</button>
</div>`).join("");

document.getElementById("promos").innerHTML=html;
}

function removePromo(i){
promos.splice(i,1);
renderPromos();
}

function addReview(){
let text=reviewText.value;
let star=stars.value;
reviews.push("⭐".repeat(star)+" - "+text);
renderReviews();
log("Reseña agregada");
}

function toggleReviews(){
reviewsBox.classList.toggle("hidden");
renderReviews();
}

function renderReviews(){
let html=reviews.map(r=>`<div class='card'>${r}</div>`).join("");
document.getElementById("reviewsBox").innerHTML=html;
}

function renderLogs(){
let html=logs.map(l=>`<div class='card'>${l}</div>`).join("");
document.getElementById("logs").innerHTML=html;
}
</script>

</div>
</body>
</html>
